<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
     <title>Login</title>
    <link rel="stylesheet" href = "../css/style2.css">
    
</head>

<body>

<!-- ĐĂNG NHẬP -->
<div class="container" id="login">
    <form>
        <h3 class="title">Đăng nhập</h3>

        <input type="email" id="email" placeholder="Nhập email">
        <input type="password" id="password" placeholder="Nhập mật khẩu">

        <div class="link"> 
        <button type="button" id="showForgot">Quên mật khẩu?</button>
        <a href="pagedangki.html" target="_blank">Đăng ký</a> 
    </div>

        
    <button type="submit">Đăng nhập</button>
    </form>
</div>

<!-- QUÊN MẬT KHẨU --> 
 <div class="container" id="forgot"> 
    <form> 
        <h3 class="title">Khôi phục mật khẩu</h3> 
        <input type="email" placeholder="Nhập email của bạn">
    
        <button>Gửi liên kết</button> 
        <div class="link"> 
            <button type="button" id="backLogin">Quay lại đăng nhập</button>
        </div> 
    </form> 
</div>
 
<script src="../js/lib.js"></script>
</body>
</html>
