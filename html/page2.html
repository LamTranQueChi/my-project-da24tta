<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
     <title>Login</title>
    <link rel="stylesheet" href = "../css/style2.css">
    
</head>

<body>

<div class="container">
    <form>
        <h3 id="title">Đăng nhập</h3>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button>Đăng nhập</button>
    </form>
</div>

<div class="forgot-form" id="forgotForm" style="display: none;">
    <h3>Reset Password</h3>
    <input type="email" placeholder="Enter your email">
    <button>Send Reset Link</button>
    <p><a href="#" id="backToLogin">Back to Login</a></p>
</div>

<div class="register-form" id="registerForm" style="display: none;">
    <h3>Create Account</h3>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Register</button>
    <p><a href="#" id="backLogin2">Back to Login</a></p>
</div>
</body>
</html>
