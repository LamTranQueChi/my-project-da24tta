<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm hoa</title>

    <link rel="stylesheet" href="../css/styledshoa.css">

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
     <header class="header">

    <div class="header-topbar">
        8:00 - 21:00 | Thứ 2 - Chủ nhật
    </div>

    <!-- Logo -->
    <div class="header-logo">
        <img src="../assets/images/Logo.jpg" alt="Logo">
    </div>

    <!-- Danh mục -->
    <div class="header-menu">

        <div class="header-column">

            <ul>
                <li>
                    <a href="#" 
                     onclick="showAllProduct(); changeBanner('Nenhoa.jpg')">
                        Tất cả ▾
                    </a>
                </li>

                <li>
                    <a href="#" 
                     onclick="filterProduct('hong'); changeBanner('bannerhoahong.jpg')">
                        Hoa hồng ▾
                    </a>
                </li>

                <li>
                    <a href="#" 
                     onclick="filterProduct('tulip'); changeBanner('bannertulip.jpg')">
                        Hoa tulip ▾
                    </a>
                </li>

                <li>
                    <a href="#" 
                     onclick="filterProduct('huongduong'); changeBanner('bannerhuongduong.jpg')">
                        Hoa hướng dương ▾
                    </a>
                </li>

                <li>
                    <a href="#" 
                     onclick="filterProduct('ly'); changeBanner('bannerhoaly.jpg')">
                        Hoa ly ▾
                    </a>
                </li>

                <li>
                    <a href="#" 
                     onclick="filterProduct('lavender'); changeBanner('bannerlavender.jpg')">
                        Hoa lavender ▾
                    </a>
                </li>
            </ul>
        </div>
            
        <div id="deletedBanner" onclick="showDeletedProducts()">
            Sản phẩm đã xóa ▾
        </div>

        

        <div class="header-column">
            <button class="contact-btn" onclick="toggleContact()">
                Liên hệ
            </button>

        <div class="contact-info" id="contactInfo">
            <p>Email: hoatuoi@gmail.com</p>
            <p>Hotline: 0123 456 789</p>
            <p>Địa chỉ: phường Trà Vinh, Tp.Trà Vinh, tỉnh Vĩnh Long</p>
        </div>
    </div>

     
    </header>

    <div class="banner">
        <img id="banner-image"
     src="../assets/images/Nenhoa.jpg"
     alt="Banner hoa">
    </div>
    
    <div class="container" id="container">
        
        <h2 class="page-title">Danh sách sản phẩm hoa</h2>
        <div class="row" id="product-list"></div>
    
    </div>

    <script src="../js/pagedshoa.js"></script>
    <script src="../js/data.js"></script>

</body>
</html>
